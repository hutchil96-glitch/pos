      responses:
        "200":
          description: Closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /brewing:
    post:
      operationId: logBrewing
      tags: [shifts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrewingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrewingLog"

  /stock/logs:
    get:
      operationId: listStockLogs
      tags: [stock]
      security:
        - bearerAuth: []
      parameters:
        - name: product_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
