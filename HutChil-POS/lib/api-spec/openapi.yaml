            application/json:
              schema:
                $ref: "#/components/schemas/SheetsSettings"
    put:
      operationId: updateSheetsSettings
      tags: [sheets]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SheetsSettingsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetsSettings"

  /sheets/export:
    post:
      operationId: exportToSheets
      tags: [sheets]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Export result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetsExportResult"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, username, role]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        role:
          type: string
        daily_wage:
          type: ["number", "null"]
        shift:
          type: ["string", "null"]
        created_at:
          type: string

    UserInput:
      type: object
      required: [name, username, password, role]
      properties:
        name:
          type: string
        username:
          type: string
        password:
          type: string
        role:
          type: string
        daily_wage:
          type: ["number", "null"]
        shift:
          type: ["string", "null"]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        password:
          type: ["string", "null"]
        role:
          type: string
        daily_wage:
          type: ["number", "null"]
        shift:
          type: ["string", "null"]

    Product:
      type: object
      required: [id, name, price, unit, qty]
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        unit:
          type: string
        qty:
          type: integer
        min_stock:
          type: ["integer", "null"]
        cost_per_unit:
          type: ["number", "null"]
        updated_at:
          type: string

    ProductInput:
      type: object
      required: [name, price, unit]
      properties:
        name:
          type: string
        price:
          type: number
        unit:
          type: string
        qty:
          type: integer
        min_stock:
          type: ["integer", "null"]
        cost_per_unit:
          type: ["number", "null"]

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        unit:
          type: string
        qty:
          type: integer
        min_stock:
          type: ["integer", "null"]
        cost_per_unit:
          type: ["number", "null"]

    StockAdjustInput:
      type: object
      required: [qty_change, reason]
      properties:
        qty_change:
          type: integer
        reason:
          type: string

    Sale:
      type: object
      required: [id, user_id, product_id, qty, price, total, payment_type, is_gift, time]
      properties:
        id:
          type: integer
        user_id:
          type: integer
        user_name:
          type: ["string", "null"]
        product_id:
          type: integer
        product_name:
          type: ["string", "null"]
        shift_id:
          type: ["integer", "null"]
        shift_type:
          type: ["string", "null"]
        qty:
          type: integer
        price:
          type: number
        total:
          type: number
        payment_type:
          type: string
        is_gift:
          type: boolean
        slip_photo:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        promo_id:
          type: ["integer", "null"]
        promo_name:
          type: ["string", "null"]
        time:
          type: string
        locked:
          type: boolean

    SaleInput:
      type: object
      required: [product_id, qty, price, total, payment_type, is_gift, time]
      properties:
        product_id:
          type: integer
        shift_id:
          type: ["integer", "null"]
        qty:
          type: integer
        price:
          type: number
        total:
          type: number
        payment_type:
          type: string
        is_gift:
          type: boolean
        slip_photo:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        promo_id:
          type: ["integer", "null"]
        time:
          type: string

    SaleUpdate:
      type: object
      properties:
        product_id:
          type: integer
        qty:
          type: integer
        price:
          type: number
        total:
          type: number
        payment_type:
          type: string
        is_gift:
          type: boolean
        slip_photo:
