  /audit:
    get:
      operationId: listAuditLogs
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: date_from
          in: query
          schema:
            type: ["string", "null"]
        - name: date_to
          in: query
          schema:
            type: ["string", "null"]
        - name: action
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/sales-chart:
    get:
      operationId: getSalesChart
      tags: [dashboard]
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesChartPoint"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
