  /purchases/{id}:
    put:
      operationId: updatePurchase
      tags: [costs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
    delete:
      operationId: deletePurchase
      tags: [costs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /daily-costs:
    get:
      operationId: listDailyCosts
      tags: [costs]
      security:
        - bearerAuth: []
      parameters:
        - name: date_from
          in: query
          schema:
            type: ["string", "null"]
        - name: date_to
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyCost"
    post:
      operationId: createDailyCost
      tags: [costs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
